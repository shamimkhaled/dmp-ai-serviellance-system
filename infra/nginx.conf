# infra/nginx.conf
# Reverse proxy for all Police AI services

server {
    listen 80;
    server_name _;

    # ── React Dashboard ──────────────────────
    location / {
        proxy_pass         http://dashboard:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Alert Service REST + WebSocket ────────
    location /api/alerts {
        proxy_pass         http://alert-service:8004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    location /ws/ {
        proxy_pass         http://alert-service:8004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # ── Video ingest service ──────────────────
    location /api/cameras {
        proxy_pass http://video-ingest:8001;
        proxy_set_header Host $host;
    }

    # ── Drafting service (not in local dev stack yet) ──
    location /api/draft {
        proxy_pass         http://drafting:8006;
        proxy_read_timeout 120s;
        proxy_set_header   Host $host;
    }

    # ── MediaMTX WebRTC/WHEP (live video) ────
    # Port 8889 is exposed directly — not proxied
    # (WebRTC requires direct connection for ICE)

    # ── Health check ──────────────────────────
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
